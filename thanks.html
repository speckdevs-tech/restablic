<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | SmartDine</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#0f0f0f',
                            green: '#22c55e',
                            greenHover: '#16a34a',
                            light: '#f3f4f6'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #0f0f0f;
            background-image: radial-gradient(circle at center, #111827 0%, #0f0f0f 100%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Success Checkmark Animation */
        .checkmark-circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 2;
            stroke-miterlimit: 10;
            stroke: #22c55e;
            fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: block;
            stroke-width: 2;
            stroke: #fff;
            stroke-miterlimit: 10;
            margin: 10% auto;
            box-shadow: inset 0px 0px 0px #22c55e;
            animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
        }

        .checkmark-check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
        }

        @keyframes stroke { 100% { stroke-dashoffset: 0; } }
        @keyframes scale { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }
        @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 40px #22c55e; } }

        /* General Entrance */
        .fade-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-brand-light antialiased min-h-screen flex flex-col items-center selection:bg-brand-green selection:text-white overflow-x-hidden">

    <!-- Background Decorative Orbs -->
    <div class="fixed top-1/4 -left-20 w-96 h-96 bg-brand-green/10 blur-[100px] rounded-full pointer-events-none"></div>
    <div class="fixed bottom-1/4 -right-20 w-96 h-96 bg-emerald-900/10 blur-[100px] rounded-full pointer-events-none"></div>

    <main class="flex-grow flex flex-col items-center justify-center w-full max-w-4xl px-6 py-20 z-10">
        
        <!-- Success Icon Section -->
        <div class="mb-8">
            <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
        </div>

        <!-- Hero Content -->
        <div class="text-center fade-up">
            <h1 class="text-4xl md:text-6xl font-display font-bold mb-4">
                Thank You! <span class="inline-block animate-bounce">🎉</span>
            </h1>
            <p class="text-xl md:text-2xl text-gray-300 font-light mb-2">
                Your submission has been received successfully.
            </p>
            <p class="text-gray-500 max-w-lg mx-auto mb-10">
                We’ll get back to you shortly. Meanwhile, discover how SmartDine is transforming the hospitality industry.
            </p>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 mb-10 fade-up delay-1">
            <a href="index.html" class="bg-brand-green hover:bg-brand-greenHover text-brand-dark font-semibold px-8 py-4 rounded-xl transition-all duration-300 transform hover:scale-105 shadow-[0_10px_20px_-5px_rgba(34,197,94,0.4)] flex items-center justify-center gap-2">
                <i data-lucide="home" class="w-5 h-5"></i>
                Go to Homepage
            </a>
        </div>
        <!-- Confirmation Note -->
        <p class=" text-sm text-gray-500 fade-up delay-3 italic">
            <i data-lucide="info" class="w-4 h-4 inline-block mr-1"></i>
            You will receive a confirmation email shortly with more details.
        </p>

    </main>

     <!-- Footer -->
    <footer class="w-full border-t border-white/5 py-8 mt-auto relative z-10 backdrop-blur-md bg-black/20">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
            <p class="text-gray-500 text-sm">
                &copy; 2026 Restablic. All rights reserved.
            </p>
            <div class="flex gap-6 text-gray-500">
                <a href="#" class="hover:text-brand-green transition-colors"><i data-lucide="twitter" class="w-5 h-5"></i></a>
                <a href="#" class="hover:text-brand-green transition-colors"><i data-lucide="instagram" class="w-5 h-5"></i></a>
                <a href="#" class="hover:text-brand-green transition-colors"><i data-lucide="linkedin" class="w-5 h-5"></i></a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script>
        // Initialize Icons
        lucide.createIcons();
    </script>
</body>
</html>
